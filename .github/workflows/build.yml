name: Build FFHack Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download substrate header
      run: |
        curl -L -o substrate.h https://raw.githubusercontent.com/theos/theos/master/include/substrate.h
        
    - name: Download ldid
      run: |
        curl -L -o ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5/ldid_macosx_arm64
        chmod +x ldid
        sudo mv ldid /usr/local/bin/
        
    - name: Compile Dylib
      run: |
        clang++ -arch arm64 -dynamiclib -O2 -mios-version-min=15.0 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework Foundation -framework CoreFoundation -framework UIKit \
          -o FFHack.dylib FFHack.mm
        
    - name: Sign Dylib
      run: |
        ldid -S FFHack.dylib
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FFHack-Dylib
        path: FFHack.dylib
