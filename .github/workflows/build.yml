name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
    
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Create substrate.h
      run: |
        cat > substrate.h << 'ENDOFFILE'
        #ifndef SUBSTRATE_H_
        #define SUBSTRATE_H_
        #ifdef __cplusplus
        extern "C" {
        #endif
        void MSHookFunction(void *s, void *h, void **o);
        void MSHookMessageEx(Class c, SEL sel, IMP imp, IMP *orig);
        #ifdef __cplusplus
        }
        #endif
        #endif
        ENDOFFILE
        
    - name: Build dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        clang++ -arch arm64 -dynamiclib -O2 -mios-version-min=15.0 -isysroot "$SDK" -I. -framework Foundation -framework CoreFoundation -framework UIKit -o FFHack.dylib FFHack.mm
        ls -la FFHack.dylib
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: FFHack
        path: FFHack.dylib
